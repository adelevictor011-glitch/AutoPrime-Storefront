<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPrime | Elite Automotive Acquisitions</title>
    
    <!-- PLATINUM TECH STACK (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .sold-stencil { text-shadow: 0 0 20px rgba(220, 38, 38, 0.5); }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(24px); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 1.5rem; }
        
        @keyframes pulse-soft {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
        .pulse-engine { animation: pulse-soft 2s infinite; }

        /* Smooth reveal for specs */
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Bottom Tab styling */
        .mobile-tab-active { color: #2563eb; }
        .mobile-tab-active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #2563eb; border-radius: 50%; }
    </style>
</head>
<body class="bg-[#f8f9fc] selection:bg-blue-100 text-slate-900 pb-20 md:pb-0">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- CONFIGURATION ---
        const WHATSAPP_NUMBER = "2349122503132";
        const BACKEND_API = window.AUTOPRIME_API || 'http://localhost:3001';
        const GOOGLE_SHEET_CSV_URL ="https://docs.google.com/spreadsheets/d/e/2PACX-1vT0qeDSTiJkeT9UkU0XvKaoSRpjT6wxCDNeRaiXonPBvpUUo176DlEIxk_qYBDF_2v5Qu4XLim5w3ia/pub?gid=0&single=true&output=csv"; 

        // --- ICONS (UI/UX Optimized) ---
        const Icon = ({ name, className = "" }) => {
            const paths = {
                car: "M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2",
                truck: "M10 17H5a2 2 0 1 1 0-4h14a2 2 0 1 1 0 4h-4",
                zap: "M13 2L3 14h9l-1 8 10-12h-9l1-8z",
                credit: "M3 10h18M7 15h.01M11 15h.01M3 6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z",
                search: "M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z",
                play: "M5 3l14 9-14 9V3z",
                info: "M12 16v-4m0-4h.01M22 12A10 10 0 1112 2a10 10 0 0110 12z",
                x: "M18 6L6 18M6 6l12 12",
                shield: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",
                menu: "M4 6h16M4 12h16M4 18h16"
            };
            return (
                <svg className={className} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d={paths[name] || ""} />
                    {name === 'car' && <><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></>}
                </svg>
            );
        };

        // --- VIDEO MODAL ---
        const VideoModal = ({ url, onClose }) => {
            const getEmbedUrl = (link) => {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                const match = link.match(regExp);
                return (match && match[2].length === 11) ? `https://www.youtube.com/embed/${match[2]}?autoplay=1&modestbranding=1` : null;
            };
            const embed = getEmbedUrl(url);
            if (!embed) return null;

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-10">
                    <div className="absolute inset-0 bg-slate-950/98 backdrop-blur-2xl" onClick={onClose}></div>
                    <div className="relative w-full max-w-5xl bg-black rounded-[2rem] md:rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/10">
                        <button onClick={onClose} className="absolute top-4 right-4 md:top-6 md:right-6 z-10 bg-white/20 text-white p-2 md:p-3 rounded-full hover:bg-white/40 transition-all backdrop-blur-md">
                            <Icon name="x" className="w-5 h-5 md:w-6 md:h-6"/>
                        </button>
                        <div className="video-container bg-black">
                            <iframe src={embed} title="Engine Start Experience" allow="autoplay; encrypted-media" allowFullScreen></iframe>
                        </div>
                        <div className="bg-slate-900 p-4 md:p-6 text-center">
                            <p className="text-white font-black uppercase text-[8px] md:text-[10px] tracking-[0.4em]">Engine Start Experience | AutoPrime Platinum</p>
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPONENT: VEHICLE CARD ---
        const Card = ({ car, formatPrice }) => {
            const [imgIdx, setImgIdx] = useState(0);
            const [showSpecs, setShowSpecs] = useState(false);
            const [activeVideo, setActiveVideo] = useState(null);

            const handleEnquiry = () => {
                const msg = `Hi AutoPrime! I'm interested in the ${car.name}. Value: ${formatPrice(car.basePrice)}. Please confirm availability and delivery timelines.`;
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            return (
                <div className="bg-white rounded-[2.5rem] md:rounded-[3.5rem] overflow-hidden shadow-2xl border border-white flex flex-col group transition-all hover:shadow-blue-200/40 relative">
                    {/* Media Section */}
                    <div className="relative h-60 md:h-72 bg-[#fcfcfc] flex items-center justify-center p-6 overflow-hidden">
                        <img 
                            src={car.images[imgIdx] || 'https://images.unsplash.com/photo-1552519507-da3b142c6e3d?w=800'} 
                            className="max-w-full max-h-full object-contain drop-shadow-2xl transition-transform duration-1000 group-hover:scale-110"
                        />
                        
                        {car.images.length > 1 && (
                            <div className="absolute bottom-4 flex gap-2 z-10">
                                {car.images.map((_, i) => (
                                    <div key={i} onClick={() => setImgIdx(i)} className={`h-1 rounded-full cursor-pointer transition-all ${i === imgIdx ? 'bg-blue-600 w-5 md:w-6' : 'bg-slate-200 w-1.5 md:w-2 hover:bg-slate-300'}`} />
                                ))}
                            </div>
                        )}

                        {/* Top Badges */}
                        <div className="absolute top-6 left-6 md:top-8 md:left-8 flex flex-col gap-2 z-10">
                            <span className="bg-white/95 backdrop-blur px-3 py-1 md:px-4 md:py-1.5 rounded-full text-[8px] md:text-[10px] font-black uppercase tracking-widest shadow-xl border border-slate-100">{car.category}</span>
                            {car.power.toLowerCase().includes('electric') && (
                                <span className="bg-blue-600 text-white px-3 py-1 md:px-4 md:py-1.5 rounded-full text-[8px] md:text-[10px] font-black uppercase flex items-center gap-1.5 shadow-lg shadow-blue-200">
                                    <Icon name="zap" className="w-3 h-3 md:w-3.5 md:h-3.5 fill-current"/> EV
                                </span>
                            )}
                        </div>

                        {/* Start Engine UX Callout */}
                        {car.video && car.status !== 'Sold' && (
                            <button 
                                onClick={() => setActiveVideo(car.video)} 
                                className="absolute top-6 right-6 md:top-8 md:right-8 bg-blue-600 text-white px-4 py-2 md:px-5 md:py-2.5 rounded-2xl shadow-2xl pulse-engine flex items-center gap-2 md:gap-3 group/btn hover:bg-slate-900 transition-colors"
                            >
                                <span className="text-[8px] md:text-[10px] font-black uppercase tracking-widest">Start Engine</span>
                                <Icon name="play" className="w-3 h-3 md:w-4 md:h-4 fill-current"/>
                            </button>
                        )}

                        {car.status === 'Sold' && (
                            <div className="absolute inset-0 bg-slate-950/85 backdrop-blur-md flex items-center justify-center z-20">
                                <div className="bg-red-600 text-white px-6 py-3 md:px-10 md:py-5 font-black text-xl md:text-3xl border-4 md:border-8 border-white -rotate-12 uppercase tracking-tighter sold-stencil shadow-2xl">JUST ACQUIRED</div>
                            </div>
                        )}
                    </div>

                    {/* Content Section */}
                    <div className="p-8 md:p-10 flex-grow flex flex-col">
                        <div className="flex justify-between items-start mb-2">
                            <h3 className="text-xl md:text-2xl font-black uppercase italic leading-tight tracking-tighter line-clamp-2">{car.name}</h3>
                        </div>
                        
                        <div className="flex flex-wrap items-center gap-3 md:gap-4 mb-6 md:mb-8">
                            <p className="text-[8px] md:text-[10px] text-slate-400 font-black uppercase tracking-[0.2em] flex items-center gap-1.5 md:gap-2">
                                <Icon name="truck" className="w-3 md:w-3.5 h-3 md:h-3.5 text-blue-600"/> Nationwide Delivery
                            </p>
                            <div className="hidden xs:block h-1 w-1 bg-slate-200 rounded-full"></div>
                            <span className="text-[8px] md:text-[10px] text-blue-600 font-black uppercase tracking-widest flex items-center gap-1.5">
                                <Icon name="shield" className="w-3 md:w-3.5 h-3 md:h-3.5"/> Quality Verified
                            </span>
                        </div>

                        <div className="mt-auto border-t border-slate-100 pt-6 md:pt-8">
                            <div className="flex flex-col xs:flex-row justify-between items-start xs:items-end gap-4 mb-6 md:mb-8">
                                <div>
                                    <p className="text-[9px] md:text-[11px] font-black text-slate-300 uppercase tracking-[0.3em] mb-1">Investment Value</p>
                                    <p className="text-blue-600 font-black text-2xl md:text-3xl tracking-tighter italic">{formatPrice(car.basePrice)}</p>
                                </div>
                                <button 
                                    onClick={handleEnquiry} 
                                    disabled={car.status === 'Sold'} 
                                    className={`w-full xs:w-auto px-6 md:px-8 py-3.5 md:py-4 rounded-[1.2rem] md:rounded-[1.5rem] font-black text-[9px] md:text-[11px] uppercase tracking-[0.2em] transition-all shadow-xl active:scale-95 ${
                                        car.status === 'Sold' 
                                        ? 'bg-slate-100 text-slate-300 cursor-not-allowed' 
                                        : 'bg-slate-950 text-white hover:bg-blue-600'
                                    }`}
                                >
                                    {car.status === 'Sold' ? 'Acquired' : 'Initiate Acquisition'}
                                </button>
                            </div>

                            <button 
                                onClick={() => setShowSpecs(!showSpecs)} 
                                className="w-full bg-slate-50 border border-slate-100 p-3 md:p-4 rounded-xl md:rounded-2xl text-[8px] md:text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-blue-600 transition-all flex items-center justify-center gap-2 md:gap-3"
                            >
                                <Icon name="info" className={`w-3.5 md:w-4 h-3.5 md:h-4 transition-transform ${showSpecs ? 'rotate-180' : ''}`}/> 
                                {showSpecs ? 'Collapse Specifications' : 'View Full Specifications'}
                            </button>

                            {showSpecs && (
                                <div className="mt-4 p-5 md:p-6 bg-slate-50/50 rounded-2xl md:rounded-3xl border border-slate-100 animate-fade-in text-center">
                                    <p className="text-[10px] md:text-[12px] font-bold text-slate-500 uppercase italic tracking-tight leading-relaxed">
                                        {car.description || 'Premium build. Contact our private concierge for complete mechanical certification and logistics surcharge details.'}
                                    </p>
                                </div>
                            )}
                        </div>
                    </div>
                    {activeVideo && <VideoModal url={activeVideo} onClose={() => setActiveVideo(null)} />}
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [cars, setCars] = useState([]);
            const [rates, setRates] = useState({ USD: 1, NGN: 1550 });
            const [currency, setCurrency] = useState('USD');
            const [loading, setLoading] = useState(true);
            const [filter, setFilter] = useState('All');
            const [req, setReq] = useState({ make: '', budget: '' });

            const cleanImg = (url) => {
                if (!url) return '';
                let t = url.trim().replace(/^"|"$/g, '');
                if (t.includes('drive.google.com')) {
                    const id = t.match(/[-\w]{25,}/);
                    if (id) return `https://lh3.googleusercontent.com/u/0/d/${id[0]}`;
                }
                return t;
            };

            const fetchData = useCallback(async () => {
                try {
                    const res = await fetch(`${GOOGLE_SHEET_CSV_URL}&t=${Date.now()}`);
                    const text = await res.text();
                    const rows = text.split(/\r?\n/).filter(r => r.trim() !== '');
                    
                    const data = rows.slice(1).map((row, idx) => {
                        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                        return {
                            id: cols[0] || idx,
                            name: cols[1] || 'Premium Unit',
                            basePrice: parseFloat((cols[2] || "0").replace(/[^0-9.]/g, '')) || 0,
                            category: cols[3] || 'Used',
                            power: cols[4] || 'Fuel', 
                            status: cols[5] || 'Available',
                            images: (cols[6] || '').split(',').map(cleanImg).filter(i => i !== ''),
                            description: cols[7] || '',
                            video: cols[8] || ''
                        };
                    });

                    const rateRow = data.find(i => i.id.toString().toUpperCase() === 'RATE');
                    if (rateRow && rateRow.basePrice > 0) setRates(r => ({ ...r, NGN: rateRow.basePrice }));
                    setCars(data.filter(i => i.id.toString().toUpperCase() !== 'RATE' && i.name.length > 2));
                } catch (e) { console.error("Sync Failure", e); } finally { setLoading(false); }
            }, []);

            useEffect(() => { 
                fetchData(); 
                const interval = setInterval(fetchData, 120000); 
                return () => clearInterval(interval);
            }, [fetchData]);

            const formatPrice = (p) => `${currency === 'USD' ? '$' : '₦'}${Math.round(p * (rates[currency] || 1)).toLocaleString()}`;
            const filtered = useMemo(() => filter === 'All' ? cars : cars.filter(c => c.category === filter), [filter, cars]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-950 text-white font-black uppercase tracking-[0.4em] md:tracking-[0.6em] animate-pulse italic px-6 text-center">
                    <Icon name="car" className="w-10 h-10 md:w-12 md:h-12 mb-8 text-blue-600"/>
                    AutoPrime Syncing
                </div>
            );

            return (
                <div className="min-h-screen selection:bg-blue-600 selection:text-white">
                    {/* Top Bar */}
                    <nav className="sticky top-0 z-50 glass-nav border-b border-slate-100 px-6 md:px-8 py-5 md:py-6 flex justify-between items-center shadow-sm">
                        <h1 className="text-xl md:text-2xl font-black italic tracking-tighter uppercase">Auto<span className="text-blue-600">Prime</span></h1>
                        <div className="flex items-center gap-4 md:gap-8">
                            <div className="hidden md:flex gap-8 text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">
                                <a href="#showroom" className="hover:text-blue-600 transition">Fleet</a>
                                <a href="#request" className="hover:text-blue-600 transition">Sourcing</a>
                                <a href="#financing" className="hover:text-blue-600 transition">Credit</a>
                            </div>
                            <div className="flex items-center gap-1.5 md:gap-2 bg-slate-100 p-1 md:p-1.5 rounded-[0.8rem] md:rounded-[1rem]">
                                <button onClick={() => setCurrency('USD')} className={`px-3 md:px-4 py-1.5 rounded-[0.6rem] md:rounded-[0.7rem] text-[9px] md:text-[10px] font-black transition-all ${currency === 'USD' ? 'bg-white shadow-md text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>USD</button>
                                <button onClick={() => setCurrency('NGN')} className={`px-3 md:px-4 py-1.5 rounded-[0.6rem] md:rounded-[0.7rem] text-[9px] md:text-[10px] font-black transition-all ${currency === 'NGN' ? 'bg-white shadow-md text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>NGN</button>
                            </div>
                        </div>
                    </nav>

                    {/* Bottom Tabs for Mobile */}
                    <nav className="fixed bottom-0 left-0 right-0 z-50 md:hidden glass-nav border-t border-slate-100 px-6 py-4 flex justify-around items-center shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
                        <a href="#showroom" className="relative flex flex-col items-center gap-1 text-slate-400 hover:text-blue-600 transition-colors">
                            <Icon name="car" className="w-5 h-5"/>
                            <span className="text-[8px] font-black uppercase tracking-widest">Fleet</span>
                        </a>
                        <a href="#request" className="relative flex flex-col items-center gap-1 text-slate-400 hover:text-blue-600 transition-colors">
                            <Icon name="search" className="w-5 h-5"/>
                            <span className="text-[8px] font-black uppercase tracking-widest">Source</span>
                        </a>
                        <a href="#financing" className="relative flex flex-col items-center gap-1 text-slate-400 hover:text-blue-600 transition-colors">
                            <Icon name="credit" className="w-5 h-5"/>
                            <span className="text-[8px] font-black uppercase tracking-widest">Credit</span>
                        </a>
                    </nav>

                    <header id="showroom" className="max-w-7xl mx-auto pt-16 md:pt-32 pb-16 md:pb-24 px-6 md:px-8 text-center">
                        <p className="text-blue-600 text-[10px] md:text-[11px] font-black uppercase tracking-[0.4em] md:tracking-[0.6em] mb-6 md:mb-8">Exclusive Automotive Sourcing</p>
                        <h2 className="text-4xl md:text-7xl lg:text-9xl font-black italic uppercase tracking-tighter leading-[0.85] md:leading-[0.8] mb-12 md:mb-16">Platinum <br/>Showroom.</h2>
                        <div className="flex flex-wrap justify-center gap-2 md:gap-3">
                            {['All', 'New', 'Used'].map(f => (
                                <button 
                                    key={f} 
                                    onClick={() => setFilter(f)} 
                                    className={`px-6 md:px-10 py-2.5 md:py-3.5 rounded-xl md:rounded-[1.5rem] text-[9px] md:text-[11px] font-black uppercase tracking-widest transition-all shadow-sm ${
                                        filter === f 
                                        ? 'bg-slate-950 text-white scale-105 md:scale-110 shadow-2xl' 
                                        : 'bg-white text-slate-400 border border-slate-100 hover:border-slate-300'
                                    }`}
                                >
                                    {f} Fleet
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 md:px-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-16">
                        {filtered.map(car => <Card key={car.id} car={car} formatPrice={formatPrice} />)}
                    </main>

                    {/* BESPOKE SOURCING */}
                    <section id="request" className="max-w-5xl mx-auto px-6 md:px-8 mt-24 md:mt-48">
                        <div className="bg-white rounded-[3rem] md:rounded-[4.5rem] p-10 md:p-24 shadow-2xl border border-slate-50 text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 md:h-3 bg-blue-600"></div>
                            <div className="bg-blue-50 w-16 h-16 md:w-24 md:h-24 rounded-full flex items-center justify-center mx-auto mb-8 md:mb-10">
                                <Icon name="search" className="w-7 h-7 md:w-10 md:h-10 text-blue-600"/>
                            </div>
                            <h3 className="text-3xl md:text-5xl font-black italic uppercase tracking-tighter mb-4 md:mb-6 leading-none">Bespoke <br/>Sourcing Concierge</h3>
                            <p className="text-slate-400 font-medium mb-10 md:mb-16 max-w-lg mx-auto text-sm md:text-lg leading-relaxed uppercase tracking-tight italic">
                                Our global procurement desk identifies, inspects, and delivers dream builds directly to your doorstep nationwide.
                            </p>
                            
                            <form 
                                onSubmit={(e) => {
                                    e.preventDefault();
                                    // Silently log enquiry to backend (non-blocking)
                                    fetch(`${BACKEND_API}/api/enquiries`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ type: 'bespoke', make: req.make, budget: req.budget }),
                                    }).catch(() => {}); // backend offline = no-op
                                    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=Hi AutoPrime! Bespoke Sourcing request:\n- Make/Model: ${req.make}\n- Target Budget: ${req.budget}`, '_blank');
                                }}
                                className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6"
                            >
                                <input required type="text" placeholder="Desired Brand / Model" className="bg-slate-50 p-5 md:p-7 rounded-2xl md:rounded-[2rem] outline-none font-bold text-sm md:text-base focus:ring-4 ring-blue-50 transition-all shadow-inner" value={req.make} onChange={e => setReq({...req, make: e.target.value})} />
                                <input required type="text" placeholder="Investment Budget" className="bg-slate-50 p-5 md:p-7 rounded-2xl md:rounded-[2rem] outline-none font-bold text-sm md:text-base focus:ring-4 ring-blue-50 transition-all shadow-inner" value={req.budget} onChange={e => setReq({...req, budget: e.target.value})} />
                                <button type="submit" className="md:col-span-2 bg-slate-950 text-white py-5 md:py-8 rounded-2xl md:rounded-[2rem] font-black uppercase tracking-[0.2em] md:tracking-[0.3em] text-[10px] md:text-sm hover:bg-blue-600 transition-all shadow-2xl">Initiate Sourcing Command</button>
                            </form>
                        </div>
                    </section>

                    {/* STRATEGIC CREDIT */}
                    <section id="financing" className="max-w-7xl mx-auto px-6 md:px-8 mt-24 md:mt-48">
                        <div className="bg-slate-950 rounded-[3rem] md:rounded-[4.5rem] p-12 md:p-32 text-white text-center relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-12 md:p-16 opacity-[0.03] rotate-12"><Icon name="credit" className="w-64 h-64 md:w-96 md:h-96 text-white"/></div>
                            <span className="bg-blue-600 px-4 md:px-6 py-1.5 md:py-2 rounded-full text-[8px] md:text-[10px] font-black uppercase tracking-[0.4em] md:tracking-[0.5em] mb-8 md:mb-12 inline-block">Strategic Credit Acquisitions</span>
